name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare example environment
        run: cp .env.example .env
      - name: Validate compose file
        run: docker compose --env-file .env.example config --quiet

  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Renovate config
        run: docker run --rm -v "$PWD:/repo" -w /repo renovate/renovate:latest renovate-config-validator renovate.json
