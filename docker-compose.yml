name: restic

services:
  restic-job:
    image: restic/restic:0.18.1
    hostname: zeus-restic
    environment:
      - TZ=Europe/Berlin
      - RESTIC_PASSWORD=${RESTIC_PASSWORD}
      - RESTIC_KEEP_DAILY=${RESTIC_KEEP_DAILY}
      - RESTIC_KEEP_WEEKLY=${RESTIC_KEEP_WEEKLY}
      - RESTIC_KEEP_MONTHLY=${RESTIC_KEEP_MONTHLY}
      - N8N_BACKUP_WEBHOOK_URL=${N8N_BACKUP_WEBHOOK_URL:-https://127.0.0.1:5678/webhook/restic/status}
      - N8N_BACKUP_WEBHOOK_TIMEOUT=${N8N_BACKUP_WEBHOOK_TIMEOUT:-10}
      - N8N_BACKUP_WEBHOOK_INSECURE=${N8N_BACKUP_WEBHOOK_INSECURE:-1}
    volumes:
      - ${RESTIC_REPOSITORY_DIR:-/opt/docker/restic/repository}:/repository
      - ${RESTIC_CACHE_DIR}:/cache
      - ${RESTIC_RESTORE_DIR}:/restore
      - ${RESTIC_OUTPUT_DIR:-/opt/docker/restic/output}:/output
      - ${RESTIC_SSH_DIR:-/opt/docker/duplicati/config/.ssh}:/root/.ssh:ro
      - ${RESTIC_CONTAINER_BACKUP_SOURCE_1:-${RESTIC_EMPTY_SOURCE_DIR:-/opt/docker/restic/empty-source}}:/source/1:ro
      - ${RESTIC_CONTAINER_BACKUP_SOURCE_2:-${RESTIC_EMPTY_SOURCE_DIR:-/opt/docker/restic/empty-source}}:/source/2:ro
      - ${RESTIC_CONTAINER_BACKUP_SOURCE_3:-${RESTIC_EMPTY_SOURCE_DIR:-/opt/docker/restic/empty-source}}:/source/3:ro
      - ./scripts:/scripts:ro
      - ./jobs:/jobs:ro
    configs:
      - source: restic_ssh_config
        target: /etc/ssh/ssh_config.d/tiffy.conf
        mode: 0400
      - source: restic_known_hosts
        target: /etc/restic/known_hosts
        mode: 0400
    extra_hosts:
      - "tiffy:192.168.125.4"
    networks:
      - default
      - backend_net
    entrypoint: ["/bin/sh"]

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.12.88/30
          gateway: 172.27.12.89
  backend_net:
    external: true
    name: network_backend_net

configs:
  restic_ssh_config:
    content: |
      Host tiffy
        HostName tiffy
        Port 2222
        User sbackupftp
        IdentityFile /root/.ssh/id.key
        IdentitiesOnly yes
        UserKnownHostsFile /etc/restic/known_hosts
        StrictHostKeyChecking yes
  restic_known_hosts:
    content: |
      [tiffy]:2222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINgnB1dfmEWCft9JXYpJo7Pxa3/fy/RpV1HbsDfSsD+H
